services:
  client:
    restart: unless-stopped
    build:
      context: ./packages/client
      dockerfile: Dockerfile-development
    command: ['node_modules/.bin/coko-client-dev-js']
    ports:
      - ${CLIENT_PORT:-4000}:${CLIENT_PORT:-4000}
    environment:
      - NODE_ENV=development
      - CLIENT_PORT=${CLIENT_PORT:-4000}
      - CLIENT_FAST_REFRESH=1
      - CLIENT_PAGE_TITLE=${CLIENT_PAGE_TITLE:-Ketty}
      - CLIENT_LANGUAGE=${CLIENT_LANGUAGE:-"en-US"}
      - CLIENT_FEATURE_UPLOAD_DOCX_FILES=true
      - CLIENT_FEATURE_BOOK_STRUCTURE=false
      - SERVER_URL=http://localhost:3000
      - WEBSOCKET_SERVER_URL=ws://localhost:3333
      - CLIENT_WS_MIN_TIMEOUT=3000
      - CLIENT_WS_TIMEOUT=30000
      - CLIENT_FAVICON_PATH=${CLIENT_FAVICON_PATH:-../static/ketida.ico}
    volumes:
      - ./packages/client/app:/home/node/app/app
    tty: true

  server:
    restart: unless-stopped
    build:
      context: ./packages/server
      dockerfile: Dockerfile-development
    depends_on:
      - db
      - createbucket
      - s3
      - epubchecker
      - pagedjs
      - xsweet
    command: ['yarn', 'coko-server', 'start-dev']
    ports:
      - ${SERVER_PORT:-3000}:${SERVER_PORT:-3000}
      - ${WS_SERVER_PORT:-3333}:${WS_SERVER_PORT:-3333}
    environment:
      - NODE_ENV=development
      - KETIDA_FLAVOUR=${KETIDA_FLAVOUR:-POD}
      - SECRET=${SECRET:-dev_secret}
      - SERVER_URL=${SERVER_URL:-http://server:3000}
      - WEBSOCKET_SERVER_URL=${WEBSOCKET_SERVER_URL:-ws://server:3333}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:4000}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ketida_dev}
      - POSTGRES_USER=${POSTGRES_USER:-dev_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev_user_password}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-password}
      - ADMIN_GIVEN_NAME=${ADMIN_GIVEN_NAME:-Admin}
      - ADMIN_SURNAME=${ADMIN_SURNAME:-Adminius}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - SERVER_PORT=${SERVER_PORT:-3000}
      - WS_SERVER_PORT=${WS_SERVER_PORT:-3333}
      - WS_HEARTBEAT_INTERVAL=${WS_HEARTBEAT_INTERVAL:-10000}
      - FAIL_SAFE_UNLOCKING_INTERVAL=${FAIL_SAFE_UNLOCKING_INTERVAL:-12000}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASSWORD=${MAILER_PASSWORD}
      - MAILER_SENDER=${MAILER_SENDER:-dev@example.com}
      - MAILER_HOSTNAME=${MAILER_HOSTNAME}
      - S3_URL=${S3_URL:-http://s3:9000}
      - S3_ACCESS_KEY_ID_USER=${S3_ACCESS_KEY_ID_USER:-ketida}
      - S3_SECRET_ACCESS_KEY_USER=${S3_SECRET_ACCESS_KEY_USER:-superSecretUserPassword}
      - S3_BUCKET=${S3_BUCKET:-uploads}
      - S3_SEPARATE_DELETE_OPERATIONS=${S3_SEPARATE_DELETE_OPERATIONS:-false}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - FILE_STORAGE_PUBLIC_URL=${FILE_STORAGE_PUBLIC_URL:-http://localhost:9000}
      # FOR THE CASE OF GCP
      # - S3_SEPARATE_DELETE_OPERATIONS=true
      # - S3_FORCE_PATH_STYLE=false
      - SERVICE_EPUB_CHECKER_CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - SERVICE_EPUB_CHECKER_SECRET=service_secret
      - SERVICE_EPUB_CHECKER_URL=${SERVICE_EPUB_CHECKER_URL:-http://epubchecker:3001}
      - SERVICE_PAGEDJS_CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - SERVICE_PAGEDJS_SECRET=service_secret
      - SERVICE_PAGEDJS_URL=${SERVICE_PAGEDJS_URL:-http://pagedjs:3003}
      - PAGEDJS_PUBLIC_URL=${PAGEDJS_PUBLIC_URL:-http://localhost:3003/preview}
      - SERVICE_XSWEET_CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - SERVICE_XSWEET_SECRET=service_secret
      - SERVICE_XSWEET_URL=${SERVICE_XSWEET_URL:-http://xsweet:3004}
      - SERVICE_FLAX_CLIENT_ID=${SERVICE_FLAX_CLIENT_ID:-edd8fd93-9129-4cef-8ad9-5ee196d10e19}
      - SERVICE_FLAX_SECRET=${SERVICE_FLAX_SECRET:-service_secret}
      # Use host.docker.internal so both the server container and the browser can reach Flax.
      - SERVICE_FLAX_URL=${SERVICE_FLAX_URL:-http://flax:3005}
      - FLAX_PUBLIC_URL=${FLAX_PUBLIC_URL:-http://localhost:3005}
      - FEATURE_UPLOAD_DOCX_FILES=true
      - FEATURE_BOOK_STRUCTURE=false
      - FEATURE_POD=true
      # - AI_ENABLED=${AI_ENABLED:-false}
      # - CHAT_GPT_KEY=${CHAT_GPT_KEY}
      - TEMP_DIRECTORY_CRON_JOB_SCHEDULE=${TEMP_DIRECTORY_CRON_JOB_TIMING:-0 * * * *}
      - TEMP_DIRECTORY_CRON_JOB_OFFSET=${TEMP_DIRECTORY_CRON_JOB_OFFSET:-1800000}
      - TEMP_DIRECTORY_CLEAN_UP=${TEMP_DIRECTORY_CLEAN_UP:-true}
      - THOTH_GRAPHQL_ENDPOINT=${THOTH_GRAPHQL_ENDPOINT:-https://api.thoth.pub/graphql}
      - THOTH_API_TOKEN=${THOTH_API_TOKEN}
      - THOTH_API_USERNAME=${THOTH_API_USERNAME}
      - THOTH_API_PASSWORD=${THOTH_API_PASSWORD}
      - THOTH_IMPRINT_ID=${THOTH_IMPRINT_ID:-3c598b87-ef90-43f1-82c1-9ebee640f8aa}
      - THOTH_WORK_TYPE=${THOTH_WORK_TYPE:-MONOGRAPH}
      - THOTH_WORK_STATUS=${THOTH_WORK_STATUS:-ACTIVE}
      - THOTH_HTML_BASE_URL=${THOTH_HTML_BASE_URL:-https://app.bookhub.ng}
      - THOTH_DEFAULT_DOI=${THOTH_DEFAULT_DOI}
    volumes:
      - ./packages/server/api:/home/node/server/api
      - ./packages/server/config:/home/node/server/config
      - ./packages/server/controllers:/home/node/server/controllers
      - ./packages/server/models:/home/node/server/models
      - ./packages/server/scripts:/home/node/server/scripts
      - ./packages/server/services:/home/node/server/services
      - ./packages/server/utilities:/home/node/server/utilities
    tty: true

  pagedjs:
    restart: unless-stopped
    depends_on:
      - db-pagedjs
    image: cokoapps/pagedjs:2.0.6
    ports:
      - ${SERVICE_PAGEDJS_PORT:-3003}:${SERVICE_PAGEDJS_PORT:-3003}
    environment:
      - SECRET=pagedjs_dev_secret
      - SERVER_PORT=${SERVICE_PAGEDJS_PORT:-3003}
      - SERVER_URL=http://localhost:${SERVICE_PAGEDJS_PORT:-3003}
      - POSTGRES_HOST=db-pagedjs
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pagedjs_dev
      - POSTGRES_USER=pagedjs_user_dev
      - POSTGRES_PASSWORD=pagedjs_user_password
      - CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - CLIENT_SECRET=service_secret
    security_opt:
      - seccomp:unconfined

  db-pagedjs:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=pagedjs_dev
      - POSTGRES_USER=pagedjs_user_dev
      - POSTGRES_PASSWORD=pagedjs_user_password

  xsweet:
    restart: unless-stopped
    depends_on:
      - db-xsweet
    image: cokoapps/xsweet:3.0.2
    ports:
      - ${SERVICE_XSWEET_PORT:-3004}:${SERVICE_XSWEET_PORT:-3004}
    environment:
      - SECRET=xsweet_dev_secret
      - SERVER_PORT=${SERVICE_XSWEET_PORT:-3004}
      - POSTGRES_HOST=db-xsweet
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xsweet_dev
      - POSTGRES_USER=xsweet_user_dev
      - POSTGRES_PASSWORD=xsweet_user_password
      - CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - CLIENT_SECRET=service_secret

  db-xsweet:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=xsweet_dev
      - POSTGRES_USER=xsweet_user_dev
      - POSTGRES_PASSWORD=xsweet_user_password

  epubchecker:
    restart: unless-stopped
    depends_on:
      - db-epubchecker
    image: cokoapps/epubchecker:2.0.3
    ports:
      - ${SERVICE_EPUB_CHECKER_PORT:-3001}:${SERVICE_EPUB_CHECKER_PORT:-3001}
    environment:
      - SECRET=epubchecker_dev_secret
      - SERVER_PORT=${SERVICE_EPUB_CHECKER_PORT:-3001}
      - POSTGRES_HOST=db-epubchecker
      - POSTGRES_PORT=5432
      - POSTGRES_DB=epubchecker_dev
      - POSTGRES_USER=epubchecker_user_dev
      - POSTGRES_PASSWORD=epubchecker_user_password
      - CLIENT_ID=edd8fd93-9129-4cef-8ad9-5ee196d10e19
      - CLIENT_SECRET=service_secret

  db-epubchecker:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=epubchecker_dev
      - POSTGRES_USER=epubchecker_user_dev
      - POSTGRES_PASSWORD=epubchecker_user_password

  flax:
    restart: unless-stopped
    depends_on:
      - db-flax
    image: cokoapps/ketty-flax:latest
    ports:
      - ${SERVICE_FLAX_PORT:-3005}:${SERVICE_FLAX_PORT:-3005}
    volumes:
      - ./flax-overrides/_layouts/base.html:/home/node/flax/flax/_layouts/base.html
      - ./flax-overrides/_includes/navigation.njk:/home/node/flax/flax/_includes/navigation.njk
      - ./flax-overrides/_includes/styles/base.css:/home/node/flax/flax/_includes/styles/base.css
      - ./flax-overrides/scripts/toc.js:/home/node/flax/flax/scripts/toc.js
      - ./flax-overrides/server/api/flax.controller.js:/home/node/flax/server/api/flax.controller.js
    environment:
      - SECRET=flax_dev_secret
      - SERVER_PORT=${SERVICE_FLAX_PORT:-3005}
      - SERVER_URL=http://localhost:${SERVICE_FLAX_PORT:-3005}
      - POSTGRES_HOST=db-flax
      - POSTGRES_PORT=5432
      - POSTGRES_DB=flax_dev
      - POSTGRES_USER=flax_user_dev
      - POSTGRES_PASSWORD=flax_user_password
      - CLIENT_ID=${SERVICE_FLAX_CLIENT_ID:-edd8fd93-9129-4cef-8ad9-5ee196d10e19}
      - CLIENT_SECRET=${SERVICE_FLAX_SECRET:-service_secret}
    security_opt:
      - seccomp:unconfined

  db-flax:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=flax_dev
      - POSTGRES_USER=flax_user_dev
      - POSTGRES_PASSWORD=flax_user_password

  db:
    restart: unless-stopped
    image: pgvector/pgvector:0.8.0-pg17
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ketida_dev}
      - POSTGRES_USER=${POSTGRES_USER:-dev_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev_user_password}

  s3:
    restart: unless-stopped
    image: minio/minio:RELEASE.2023-12-07T04-16-00Z-cpuv1
    ports:
      - ${S3_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio_storage:/data
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID_ADMIN:-admin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY_ADMIN:-superSecretAdminPassword}
    command: server --console-address ":9001" /data
    healthcheck:
      test: ['CMD', 'true']
      interval: 0.5s
      timeout: 20s
      retries: 30

  createbucket:
    image: minio/mc:RELEASE.2023-12-02T11-24-10Z-cpuv1
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc config host add ketida ${S3_PROTOCOL:-http}://${S3_HOST:-s3}:${S3_PORT:-9000} ${S3_ACCESS_KEY_ID_ADMIN:-admin} ${S3_SECRET_ACCESS_KEY_ADMIN:-superSecretAdminPassword}
        /usr/bin/mc admin user add ketida/ ${S3_ACCESS_KEY_ID_USER:-ketida} ${S3_SECRET_ACCESS_KEY_USER:-superSecretUserPassword};
        /usr/bin/mc admin user enable ketida/ ${S3_ACCESS_KEY_ID_USER:-ketida};
        /usr/bin/mc mb ketida/${S3_BUCKET:-uploads};
        /usr/bin/mc admin policy attach ketida readwrite --user ${S3_ACCESS_KEY_ID_USER:-ketida};
        exit 0;
      "

volumes:
  minio_storage:
