type BackAdminStats {
  totalUsers: Int!
  activeUsers: Int!
  totalBooks: Int!
}

type BackAdminUser {
  id: ID!
  username: String
  displayName: String
  email: String
  isActive: Boolean!
  isVerified: Boolean!
}

type BackAdminBookUserStats {
  userId: ID!
  displayName: String
  email: String
  isActive: Boolean!
  ownedBooks: Int!
  collaboratorBooks: Int!
  totalBooks: Int!
  webPublishedBooks: Int!
  metadataAveragePercent: Int!
}

type BackAdminBookTransfer {
  id: ID!
  bookId: ID!
  bookTitle: String
  fromUserId: ID!
  fromUserEmail: String
  fromUserName: String
  toUserId: ID!
  toUserEmail: String
  toUserName: String
  transferredByUserId: ID!
  transferredByEmail: String
  transferredByName: String
  status: String!
  reason: String
  revokeReason: String
  revokedByUserId: ID
  revokedByEmail: String
  revokedByName: String
  revokedAt: String
  created: String!
}

type BackAdminBookTransferTrailUser {
  pathKey: String!
  userId: ID!
  email: String
  name: String
}

type BackAdminBookTransferTrail {
  bookId: ID!
  bookTitle: String
  currentOwnerUserId: ID
  currentOwnerEmail: String
  currentOwnerName: String
  ownerPath: [BackAdminBookTransferTrailUser!]!
  revokeTargets: [BackAdminBookTransferTrailUser!]!
  entries: [BackAdminBookTransfer!]!
}

type BackAdminAccess {
  signInEnabled: Boolean!
  signUpEnabled: Boolean!
}

type BackAdminEmailResult {
  sent: Int!
  failed: Int!
}

type BackAdminEmailQueueStats {
  pending: Int!
  processing: Int!
  sent: Int!
  failed: Int!
  total: Int!
  oldestPendingAt: String
  lastFailedAt: String
}

type BackAdminOtpRequestResult {
  ok: Boolean!
  message: String!
  expiresInSec: Int!
}

type BackAdminSession {
  token: String!
  email: String!
  expiresAt: String!
}

type BackAdminInstanceHealth {
  service: String!
  url: String
  status: String!
  isHealthy: Boolean!
  statusCode: Int
  latencyMs: Int
  message: String
  checkedAt: String!
  cpuLoad1: Float
  cpuLoad5: Float
  cpuLoad15: Float
  memoryUsedMb: Float
  memoryTotalMb: Float
}

type BackAdminLoadPoint {
  timestamp: String!
  load1: Float
  load5: Float
  load15: Float
  memoryUsedMb: Float
  memoryTotalMb: Float
}

type BackAdminInstanceLog {
  id: ID!
  service: String!
  status: String!
  message: String
  checkedAt: String!
  statusCode: Int
  latencyMs: Int
}

type BackAdminThothEnvironmentStatus {
  key: String!
  label: String!
  endpoint: String!
  ok: Boolean!
  message: String!
  publisherId: String!
  publisherName: String
  imprintId: String!
  imprintName: String
}

type BackAdminThothStatus {
  defaultEnvironment: String
  environments: [BackAdminThothEnvironmentStatus!]!
}

type BackAdminThothWorkSummary {
  workId: ID!
  title: String!
  subtitle: String
  doi: String
  reference: String
  publicationDate: String
  updatedAt: String
  landingPage: String
  publisherId: String
  publisherName: String
  imprintId: String
  imprintName: String
  isBookHubPublisher: Boolean!
  isBookHubSynced: Boolean!
}

type BackAdminThothTitle {
  titleId: ID
  fullTitle: String!
  title: String!
  subtitle: String
  canonical: Boolean!
  localeCode: String!
}

type BackAdminThothContributor {
  contributionId: ID!
  fullName: String!
  contributionType: String!
  contributionOrdinal: Int!
  mainContribution: Boolean!
  firstName: String
  lastName: String!
}

type BackAdminThothLocation {
  locationId: ID!
  landingPage: String
  fullTextUrl: String
  locationPlatform: String!
  canonical: Boolean!
}

type BackAdminThothPublication {
  publicationId: ID!
  publicationType: String!
  isbn: String
  updatedAt: String!
  locations: [BackAdminThothLocation!]!
}

type BackAdminThothSubject {
  subjectType: String!
  subjectCode: String!
  subjectOrdinal: Int!
}

type BackAdminThothLanguage {
  languageCode: String!
  languageRelation: String!
}

type BackAdminThothWorkDetail {
  workId: ID!
  title: String!
  subtitle: String
  doi: String
  reference: String
  publicationDate: String
  updatedAt: String
  landingPage: String
  publisherId: String
  publisherName: String
  imprintId: String
  imprintName: String
  isBookHubPublisher: Boolean!
  isBookHubSynced: Boolean!
  workType: String!
  workStatus: String!
  edition: Int
  license: String
  copyrightHolder: String
  generalNote: String
  coverCaption: String
  pageCount: Int
  pageBreakdown: String
  imageCount: Int
  tableCount: Int
  audioCount: Int
  videoCount: Int
  firstPage: String
  lastPage: String
  pageInterval: String
  lccn: String
  oclc: String
  titles: [BackAdminThothTitle!]!
  contributors: [BackAdminThothContributor!]!
  publications: [BackAdminThothPublication!]!
  subjects: [BackAdminThothSubject!]!
  languages: [BackAdminThothLanguage!]!
}

type BackAdminThothWorksResult {
  environment: String!
  page: Int!
  pageSize: Int!
  totalCount: Int!
  items: [BackAdminThothWorkSummary!]!
}

extend type Query {
  backAdminValidate(sessionToken: String!): Boolean!
  backAdminStats(sessionToken: String!): BackAdminStats!
  backAdminUsers(sessionToken: String!): [BackAdminUser!]!
  backAdminBookUserStats(sessionToken: String!): [BackAdminBookUserStats!]!
  backAdminBookTransfers(
    sessionToken: String!
    status: String
    search: String
  ): [BackAdminBookTransfer!]!
  backAdminBookTransferTrail(
    sessionToken: String!
    bookId: ID!
  ): BackAdminBookTransferTrail!
  backAdminAccess(sessionToken: String!): BackAdminAccess!
  backAdminEmailQueueStats(sessionToken: String!): BackAdminEmailQueueStats!
  backAdminInstanceHealth(sessionToken: String!): [BackAdminInstanceHealth!]!
  backAdminLoadSeries(
    sessionToken: String!
    service: String
    minutes: Int
  ): [BackAdminLoadPoint!]!
  backAdminInstanceLogs(
    sessionToken: String!
    service: String
    limit: Int
  ): [BackAdminInstanceLog!]!
  backAdminThothStatus(sessionToken: String!): BackAdminThothStatus!
  backAdminThothWorks(
    sessionToken: String!
    environment: String
    search: String
    publisherOnly: Boolean
    syncedOnly: Boolean
    page: Int
    pageSize: Int
  ): BackAdminThothWorksResult!
  backAdminThothWork(
    sessionToken: String!
    environment: String
    workId: ID!
  ): BackAdminThothWorkDetail!
  publicAccessControls: BackAdminAccess!
}

extend type Mutation {
  backAdminRequestOtp(email: String!): BackAdminOtpRequestResult!
  backAdminVerifyOtp(email: String!, otp: String!): BackAdminSession!
  backAdminSetUserActive(
    sessionToken: String!
    userId: ID!
    isActive: Boolean!
  ): Boolean!
  backAdminLogoutUser(sessionToken: String!, userId: ID!): Boolean!
  backAdminLogoutAll(sessionToken: String!, includeAdmins: Boolean): Int!
  backAdminSendEmail(
    sessionToken: String!
    subject: String!
    message: String!
    userIds: [ID!]
    sendToAll: Boolean
  ): BackAdminEmailResult!
  backAdminSetAccess(
    sessionToken: String!
    signInEnabled: Boolean!
    signUpEnabled: Boolean!
  ): BackAdminAccess!
  backAdminRevokeBookTransfer(
    sessionToken: String!
    transferId: ID!
    targetUserId: ID
    reason: String
  ): BackAdminBookTransfer!
}
